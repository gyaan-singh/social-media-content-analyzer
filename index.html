<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Social Media Content Analyzer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#f4f6f9;
padding:40px;

}

.container{

max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);

}

h1{

text-align:center;
margin-bottom:30px;
color:#333;

}

.drop-area{

border:3px dashed #007bff;
padding:40px;
text-align:center;
border-radius:15px;
cursor:pointer;
transition:.3s;

}

.drop-area:hover{

background:#eef5ff;

}

input{

display:none;

}

button{

margin-top:20px;
padding:12px 25px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;

}

button:hover{

background:#0056b3;

}

.loading{

display:none;
text-align:center;
margin-top:20px;
font-size:18px;

}

.spinner{

width:40px;
height:40px;
border:5px solid #ddd;
border-top:5px solid #007bff;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

.card{

margin-top:30px;
padding:20px;
background:#fafafa;
border-radius:10px;
border-left:5px solid #007bff;

}

pre{

white-space:pre-wrap;
word-wrap:break-word;

}

</style>

</head>

<body>

<div class="container">

<h1>Social Media Content Analyzer</h1>

<div class="drop-area" id="drop">

<h2>Drag & Drop PDF/Image</h2>

<p>or</p>

<button onclick="document.getElementById('file').click()">

Choose File

</button>

<input type="file" id="file">

</div>

<div class="loading" id="loading">

<div class="spinner"></div>

<p>Analyzing...</p>

</div>

<div class="card">

<h2>Extracted Text</h2>

<pre id="text"></pre>

</div>

<div class="card">

<h2>AI Analysis</h2>

<pre id="analysis"></pre>

</div>

</div>

<script>

const drop=document.getElementById("drop");

const input=document.getElementById("file");

drop.addEventListener("dragover",e=>{

e.preventDefault();

});

drop.addEventListener("drop",e=>{

e.preventDefault();

upload(e.dataTransfer.files[0]);

});

input.addEventListener("change",()=>{

upload(input.files[0]);

});

function upload(file){

let data=new FormData();

data.append("file",file);

document.getElementById("loading").style.display="block";

fetch("/upload",{

method:"POST",

body:data

})

.then(res=>res.json())

.then(data=>{

document.getElementById("loading").style.display="none";

if(data.error){

alert(data.error);

return;

}

document.getElementById("text").innerText=data.text;

document.getElementById("analysis").innerText=data.analysis;

})

.catch(err=>{

document.getElementById("loading").style.display="none";

alert("Something went wrong");

});

}

</script>

</body>
</html>
